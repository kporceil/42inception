# Bloc "events" obligatoire — gère les connexions réseau
# worker_connections = nombre max de connexions simultanées par worker
events {
    worker_connections 1024;
}

http {
    # include les types MIME (associe extensions de fichiers à Content-Type)
    # ex: .css → text/css, .png → image/png
    # Nécessaire pour que le navigateur interprète correctement les fichiers statiques
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server {
        # Écoute sur le port 443 en SSL (HTTPS)
        # http2 = active HTTP/2 pour de meilleures performances
        listen 443 ssl;
        listen [::]:443 ssl;

        # Nom de domaine de ce serveur virtuel
        server_name kporceil.42lyon.fr;

        # Chemins vers le certificat et la clé privée générés dans le Dockerfile
        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;

        # Protocoles TLS autorisés — le sujet impose TLSv1.2 ou TLSv1.3 uniquement
        ssl_protocols TLSv1.2 TLSv1.3;

        # Répertoire racine des fichiers WordPress
        # C'est le volume wp_data monté sur les deux containers (nginx + wordpress)
        root /var/www/wordpress;

        # Fichier index par défaut
        index index.php;

        # Règle pour toutes les URLs
        location / {
            # try_files = cherche le fichier dans l'ordre :
            # 1. $uri          → le fichier exact demandé (ex: /style.css)
            # 2. $uri/         → un répertoire avec ce nom
            # 3. /index.php?$args → sinon passe à WordPress (routing WordPress)
            try_files $uri $uri/ /index.php?$args;
        }

        # Règle pour tous les fichiers PHP (regex : se termine par .php)
        location ~ \.php$ {
            # Vérifie que le fichier PHP existe vraiment (sécurité)
            # Évite d'exécuter du code PHP dans des noms de fichiers malicieux
            try_files $uri =404;

            # Passe la requête à PHP-FPM via FastCGI
            # "wordpress" = nom du service dans docker-compose (DNS Docker)
            # ":9000"     = port FastCGI
            fastcgi_pass wordpress:9000;

            # include des paramètres FastCGI standard
            # (définit SCRIPT_FILENAME, REQUEST_METHOD, etc.)
            include fastcgi_params;

            # SCRIPT_FILENAME = chemin absolu du fichier PHP à exécuter
            # $document_root = valeur de "root" défini plus haut
            # $fastcgi_script_name = la partie URI du fichier .php
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        }
    }
}
